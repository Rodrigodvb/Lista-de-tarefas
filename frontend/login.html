<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                background: #9092ee;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            .container {
                background: white;
                padding: 30px;
                border-radius: 10px;
                width: 300px;
            }

            h2 {
                text-align: center;
                color: #490c99;
            }

            input {
                width: 90%;
                padding: 10px;
                margin: 10px 0;
                border: 2px solid #490c99;
                border-radius: 5px;
            }

            button {
                width: 98%;
                padding: 10px;
                background: #490c99;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }

            button:hover {
                background: #a849d4;
            }

            .toggle {
                margin-top: 10px;
                text-align: center;
                cursor: pointer;
                color: #490c99;
            }

            .error {
                color: red;
                text-align: center;
            }
        </style>
    </head>
    <body>

    <div class="container">
        <h2 id="title">Login</h2>

        <input id="username" type="text" placeholder="Usuário">
        <input id="password" type="password" placeholder="Senha">

        <button id="submitBtn">Entrar</button>

        <p class="toggle" id="toggleMode">Não tem conta? Registrar</p>
        <p class="error" id="errorMsg"></p>
    </div>

    <script type="module" src="./src/login.js"></script>
    </body>
</html>
