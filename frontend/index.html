<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lista de Tarefas</title>
</head>
<body>
    <h1>Minha lista de tarefas</h1>
    <div class="input-container">
        <input id="taskInput" type="text" placeholder="Digite a sua tarefa">
        <button id="addTaskBtn" >Adicionar</button>
    </div>
    <div class="filters">
        <button data-filter="todas">Todas</button>
        <button data-filter="pendentes">Pendentes</button>
        <button data-filter="concluidas">Concluídas</button>
    </div>
    <p id="taskCounter"></p>

    <ul id="taskList"></ul>
    <template id="taskTemplate">
        <li>
            <span></span>
            <div class="actions">
                <span>✔</span>
                <span>🗑</span>
            </div>
        </li>
    </template>
    <button id="logoutBtn">Sair</button>
    
    <script type="module" src="./src/main.js"></script>
</body>
</html>
